<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Сладости Дарсмы — Заказать</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#FBF7F2;--card:#FFF;--text:#2C1810;--text2:#8B7355;
--ac:#C8956C;--ac2:#B07D56;--acg:rgba(200,149,108,.3);
--gold:#D4A76A;--goldl:#F0DFC0;--brd:rgba(44,24,16,.08);
--sh:0 8px 30px rgba(44,24,16,.1);--shl:0 20px 60px rgba(44,24,16,.15);
--r:20px;
--glass:rgba(255,255,255,.45);--glass-border:rgba(255,255,255,.55);
--glass-sh:0 8px 32px rgba(44,24,16,.08),inset 0 1px 0 rgba(255,255,255,.6);
--glass-sh-hover:0 12px 40px rgba(44,24,16,.12),inset 0 1px 0 rgba(255,255,255,.7);
--heart:#E85D75;

/* iOS 26 Spring Physics */
--spring-ios: cubic-bezier(0.32, 0.72, 0, 1);
--spring-liquid: cubic-bezier(0.4, 0, 0.1, 1.1);
--spring-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
--spring-snappy: cubic-bezier(0.2, 0.8, 0.2, 1);
--spring-magnetic: cubic-bezier(0.175, 0.885, 0.32, 1.15);
--spring-morph: cubic-bezier(0.5, 0, 0, 1);
}
html{scroll-behavior:smooth;background:#FBF7F2;background:var(--bg)}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}

/* === LIQUID GLASS HEADER === */
.hd{position:sticky;top:0;z-index:100;
background:linear-gradient(135deg,rgba(255,255,255,.7),rgba(251,247,242,.75));
backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);
border-bottom:1px solid var(--glass-border);
padding:14px 20px;transition:box-shadow .3s ease;
box-shadow:0 1px 0 rgba(255,255,255,.5)}
.hd.sc{box-shadow:0 4px 30px rgba(44,24,16,.1),0 1px 0 rgba(255,255,255,.4)}
.hd-i{max-width:600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.br{display:flex;align-items:center;gap:12px}
.br-ic{width:40px;height:40px;background:linear-gradient(135deg,var(--gold),var(--ac));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 12px var(--acg)}
.br-t h1{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;letter-spacing:.5px}
.br-t span{font-size:11px;color:var(--text2);letter-spacing:2px;text-transform:uppercase;font-weight:600}

.hd-btns{display:flex;align-items:center;gap:8px}
.cb{position:relative;width:44px;height:44px;border-radius:14px;border:1.5px solid var(--glass-border);
background:rgba(255,255,255,.6);
display:flex;align-items:center;justify-content:center;cursor:pointer;
transition:transform .25s cubic-bezier(.34,1.56,.64,1),border-color .2s,box-shadow .2s;-webkit-tap-highlight-color:transparent;
box-shadow:var(--glass-sh)}
.cb:hover{border-color:var(--ac);box-shadow:var(--glass-sh-hover);transform:scale(1.05)}
.cb:active{transform:scale(.95)}
.cb svg{width:22px;height:22px;color:var(--text)}
.badge{position:absolute;top:-6px;right:-6px;min-width:20px;height:20px;background:var(--ac);color:#fff;font-size:11px;font-weight:700;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 6px;opacity:0;transform:scale(0);transition:all .35s cubic-bezier(.34,1.56,.64,1)}
.badge.v{opacity:1;transform:scale(1)}
.badge.bmp{animation:bmp .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes bmp{50%{transform:scale(1.3)}}

.hero{max-width:600px;margin:0 auto;padding:24px 20px 8px;text-align:center;position:relative;z-index:1}
.hero h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;line-height:1.25;margin-bottom:6px}
.hero h2 em{font-style:italic;color:var(--ac)}
.hero p{color:var(--text2);font-size:14px;line-height:1.5}

/* === SEARCH BAR === */
.search-w{max-width:600px;margin:0 auto;padding:14px 16px 4px;position:relative;z-index:1}
.search{width:100%;padding:12px 16px 12px 42px;border-radius:16px;border:1.5px solid var(--glass-border);
background:rgba(255,255,255,.7);
font-family:'Nunito',sans-serif;font-size:14px;font-weight:500;color:var(--text);
transition:border-color .3s,box-shadow .3s;box-shadow:var(--glass-sh);outline:none}
.search::placeholder{color:var(--text2);opacity:.7}
.search:focus{border-color:var(--ac);box-shadow:var(--glass-sh-hover),0 0 0 3px var(--acg)}
.search-ic{position:absolute;left:30px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--text2);pointer-events:none;transition:color .3s}
.search:focus~.search-ic{color:var(--ac)}
.search-clr{position:absolute;right:28px;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:11px;background:rgba(44,24,16,.08);border:none;display:none;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:13px;transition:all .2s}
.search-clr.v{display:flex}
.search-clr:hover{background:rgba(44,24,16,.12)}
.search-empty{max-width:600px;margin:0 auto;padding:40px 20px;text-align:center;color:var(--text2);display:none;position:relative;z-index:1}
.search-empty .se-ic{font-size:44px;margin-bottom:10px;opacity:.5}

.tabs{max-width:600px;margin:0 auto;padding:14px 16px 0;display:flex;gap:7px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:relative;z-index:1}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 14px;border-radius:11px;border:1.5px solid var(--brd);background:var(--card);font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;white-space:nowrap;transition:background .2s,color .2s,border-color .2s;-webkit-tap-highlight-color:transparent}
.tab.on{background:var(--text);color:#fff;border-color:var(--text)}
.tab:hover:not(.on){border-color:var(--ac);color:var(--text)}

.stit{max-width:600px;margin:0 auto;padding:18px 20px 8px;font-family:'Playfair Display',serif;font-size:17px;font-weight:700;position:relative;z-index:1}

.grid{max-width:600px;margin:0 auto;padding:0 16px 10px;display:grid;grid-template-columns:repeat(2,1fr);gap:12px;position:relative;z-index:1}
.grid:last-of-type{padding-bottom:140px}

/* === LIQUID GLASS CARDS === */
.card{background:linear-gradient(145deg,rgba(255,255,255,.85),rgba(255,255,255,.65));
border-radius:var(--r);overflow:hidden;border:1px solid var(--glass-border);
transition:transform .3s cubic-bezier(.4,0,.2,1),box-shadow .3s ease,border-color .3s ease;
opacity:0;transform:translateY(20px) scale(.97);
box-shadow:var(--glass-sh);position:relative;
contain:layout style paint;content-visibility:auto;contain-intrinsic-size:auto 320px}
.card.vis{opacity:1;transform:translateY(0) scale(1)}
.card:hover{box-shadow:var(--glass-sh-hover);transform:translateY(-3px) scale(1.01);border-color:rgba(200,149,108,.25)}

.cimg{width:100%;aspect-ratio:1;background:linear-gradient(135deg,var(--goldl),#F5ECDF);overflow:hidden;cursor:zoom-in;position:relative}
.cimg img{width:100%;height:100%;object-fit:cover;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.card:hover .cimg img{transform:scale(1.05)}
.cimg .zh{position:absolute;bottom:8px;right:8px;width:28px;height:28px;background:rgba(255,255,255,.85);border-radius:8px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s;pointer-events:none}
.cimg .zh svg{width:16px;height:16px;color:var(--text)}
.card:hover .zh{opacity:1}

/* === FAVORITE HEART === */
.fav-btn{position:absolute;top:8px;right:8px;width:32px;height:32px;border-radius:10px;
background:rgba(255,255,255,.9);
border:1px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;
cursor:pointer;z-index:2;transition:transform .3s cubic-bezier(.34,1.56,.64,1),background .2s;-webkit-tap-highlight-color:transparent}
.fav-btn:active{transform:scale(.85)}
.fav-btn svg{width:17px;height:17px;color:#ccc;transition:all .3s;fill:none;stroke:currentColor;stroke-width:2}
.fav-btn.on svg{color:var(--heart);fill:var(--heart);stroke:var(--heart)}
.fav-btn.on{background:rgba(232,93,117,.1)}
.fav-btn.pop{animation:favPop .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes favPop{0%{transform:scale(1)}30%{transform:scale(1.35)}100%{transform:scale(1)}}

.cinf{padding:11px}
.cnm{font-family:'Playfair Display',serif;font-size:13px;font-weight:600;margin-bottom:2px;line-height:1.3}
.ask-link{display:inline-flex;align-items:center;gap:4px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;color:#2AABEE;cursor:pointer;text-decoration:none;transition:all .2s;padding:3px 0;-webkit-tap-highlight-color:transparent}
.ask-link:hover{opacity:.8}
.ask-link svg{width:14px;height:14px;flex-shrink:0}
.cds{font-size:11px;color:var(--text2);line-height:1.3;margin-bottom:8px}

/* === QUANTITY PRESETS === */
.presets{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.preset{padding:3px 8px;border-radius:8px;border:1px solid var(--brd);background:var(--bg);
font-family:'Nunito',sans-serif;font-size:10px;font-weight:700;color:var(--text2);
cursor:pointer;transition:background .2s,color .2s,border-color .2s,transform .15s;-webkit-tap-highlight-color:transparent}
.preset:hover{border-color:var(--ac);color:var(--ac)}
.preset:active{transform:scale(.92);background:var(--acg)}
.preset.on{background:var(--ac);color:#fff;border-color:var(--ac)}

.cft{display:flex;align-items:center;justify-content:flex-end}

.qc{display:flex;align-items:center}
.qb{width:32px;height:32px;border-radius:10px;border:1.5px solid var(--brd);background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;font-size:16px;color:var(--text);user-select:none}
.qb:active{transform:scale(.9)}
.qb.add{background:var(--ac);border-color:var(--ac);color:#fff;box-shadow:0 3px 10px var(--acg)}
.qb.add:hover{background:var(--ac2)}
.qb.min{opacity:0;width:0;border:none;pointer-events:none;transition:all .25s cubic-bezier(.34,1.56,.64,1)}
.qb.min.v{opacity:1;width:32px;border:1.5px solid var(--brd);pointer-events:auto}
.qv{width:0;text-align:center;font-weight:700;font-size:13px;overflow:hidden;transition:all .25s cubic-bezier(.34,1.56,.64,1);cursor:pointer;-webkit-tap-highlight-color:transparent;border:none;background:none;color:var(--text);font-family:'Nunito',sans-serif;padding:0;-moz-appearance:textfield}
.qv::-webkit-inner-spin-button,.qv::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.qv.v{width:34px}
.qv:focus{outline:2px solid var(--ac);outline-offset:1px;border-radius:5px}

/* Lightbox */
.lb{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.92);opacity:0;pointer-events:none;transition:opacity .35s;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;cursor:zoom-out}
.lb.op{opacity:1;pointer-events:auto}
.lb img{max-width:92vw;max-height:85vh;border-radius:16px;transform:scale(.85);transition:transform .4s cubic-bezier(.32,.72,0,1);box-shadow:0 30px 80px rgba(0,0,0,.5);object-fit:contain}
.lb.op img{transform:scale(1)}
.lb-x{position:absolute;top:max(16px,env(safe-area-inset-top));right:16px;width:40px;height:40px;border-radius:20px;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s,transform .2s}
.lb-x:hover{background:rgba(255,255,255,.25);transform:scale(1.1)}
.lb-bot{position:absolute;bottom:max(24px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:10px}
.lb-lbl{color:#fff;font-size:14px;font-weight:600;text-align:center;max-width:80vw;background:rgba(0,0,0,.6);padding:8px 18px;border-radius:12px}
.lb-ask{display:inline-flex;align-items:center;gap:6px;background:#2AABEE;color:#fff;border:none;padding:10px 20px;border-radius:14px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .25s;-webkit-tap-highlight-color:transparent;box-shadow:0 4px 16px rgba(42,171,238,.4)}
.lb-ask:hover{transform:scale(1.05)}
.lb-ask:active{transform:scale(.96)}
.lb-ask svg{width:18px;height:18px}

/* Cart */
.co{position:fixed;inset:0;background:rgba(44,24,16,.45);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
.co.op{opacity:1;pointer-events:auto}
.cd{position:fixed;bottom:0;left:0;right:0;max-width:600px;margin:0 auto;background:var(--bg);border-radius:28px 28px 0 0;z-index:201;transform:translateY(100%);transition:transform .4s cubic-bezier(.32,.72,0,1);max-height:85dvh;display:flex;flex-direction:column;will-change:transform}
.cd.op{transform:translateY(0)}
.cd-h{width:36px;height:4px;border-radius:2px;background:rgba(44,24,16,.15);margin:12px auto 0;flex-shrink:0}
.cd-hd{padding:16px 24px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cd-hd h3{font-family:'Playfair Display',serif;font-size:20px;font-weight:700}
.cd-tabs{display:flex;gap:6px;padding:0 24px 12px;flex-shrink:0}
.cd-tab{padding:6px 14px;border-radius:10px;border:1.5px solid var(--brd);background:var(--card);font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .25s;-webkit-tap-highlight-color:transparent}
.cd-tab.on{background:var(--text);color:#fff;border-color:var(--text)}
.clr{font-size:13px;color:var(--text2);cursor:pointer;padding:5px 10px;border-radius:8px;border:none;background:none;transition:all .2s;font-family:'Nunito',sans-serif;font-weight:600}
.clr:hover{background:rgba(44,24,16,.05);color:var(--text)}
.ci-w{flex:1;overflow-y:auto;padding:0 24px;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;will-change:scroll-position}
.ci-e{text-align:center;padding:40px 0;color:var(--text2)}
.ci-e .ei{font-size:44px;margin-bottom:10px;opacity:.6}

.cit{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--brd);animation:si .35s var(--spring-ios,cubic-bezier(.2,.8,.2,1)) both;will-change:transform,opacity;contain:layout style}
@keyframes si{from{opacity:0;transform:translateY(12px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.cit-img{width:46px;height:46px;border-radius:12px;flex-shrink:0;overflow:hidden;background:var(--goldl);cursor:zoom-in}
.cit-img img{width:100%;height:100%;object-fit:cover}
.cit-d{flex:1;min-width:0}
.cit-n{font-weight:600;font-size:13px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cit-w{font-size:11px;color:var(--text2)}
.cit-q{display:flex;align-items:center;gap:5px;flex-shrink:0}
.cit-q .cqb{width:26px;height:26px;border-radius:8px;border:1.5px solid var(--brd);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--text);transition:transform .2s cubic-bezier(.34,1.56,.64,1);-webkit-tap-highlight-color:transparent}
.cit-q .cqb:active{transform:scale(.85);background:var(--goldl,rgba(200,149,108,.1))}
.cit-q .cqi{width:38px;text-align:center;font-weight:700;font-size:13px;border:1.5px solid var(--brd);border-radius:8px;background:var(--card);color:var(--text);padding:3px 0;font-family:'Nunito',sans-serif;-moz-appearance:textfield}
.cit-q .cqi::-webkit-inner-spin-button,.cit-q .cqi::-webkit-outer-spin-button{-webkit-appearance:none}
.cit-q .cqi:focus{outline:none;border-color:var(--ac)}

/* === ORDER HISTORY === */
.hist-item{background:var(--card);border-radius:16px;border:1px solid var(--brd);padding:14px;margin-bottom:10px;animation:si .3s ease forwards}
.hist-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.hist-date{font-size:12px;color:var(--text2);font-weight:600}
.hist-cnt{font-size:11px;color:var(--text2)}
.hist-items{font-size:12px;line-height:1.6;color:var(--text);margin-bottom:10px}
.hist-reorder{padding:8px 16px;border-radius:10px;border:1.5px solid var(--ac);background:none;
font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--ac);
cursor:pointer;transition:all .25s;-webkit-tap-highlight-color:transparent;width:100%}
.hist-reorder:hover{background:var(--ac);color:#fff}
.hist-reorder:active{transform:scale(.97)}
.hist-clear{font-size:11px;color:var(--text2);cursor:pointer;border:none;background:none;
font-family:'Nunito',sans-serif;font-weight:600;padding:5px 10px;border-radius:8px;transition:all .2s;margin-top:8px}
.hist-clear:hover{background:rgba(44,24,16,.05);color:var(--text)}

.cd-ft{padding:16px 24px;padding-bottom:max(16px,env(safe-area-inset-bottom));border-top:1px solid var(--brd);flex-shrink:0}
.cs{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cs-l{font-size:14px;color:var(--text2)}
.cs-v{font-family:'Playfair Display',serif;font-size:17px;font-weight:700}

.tb{width:100%;padding:14px;border-radius:16px;border:none;background:linear-gradient(135deg,#2AABEE,#229ED9);color:#fff;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .3s cubic-bezier(.34,1.56,.64,1);-webkit-tap-highlight-color:transparent;box-shadow:0 6px 24px rgba(42,171,238,.3)}
.tb:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(42,171,238,.4)}
.tb:active{transform:scale(.97)}
.tb svg{width:20px;height:20px;flex-shrink:0}
.tb.dis{opacity:.5;pointer-events:none}

.fc{position:fixed;bottom:max(20px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(80px);z-index:150;
background:var(--text);color:#fff;border-radius:24px;padding:12px 20px;
display:flex;align-items:center;gap:10px;cursor:pointer;box-shadow:var(--shl);
transition:all .4s cubic-bezier(.34,1.56,.64,1);-webkit-tap-highlight-color:transparent;max-width:calc(100% - 40px)}
.fc.v{transform:translateX(-50%) translateY(0)}
.fc:active{transform:translateX(-50%) scale(.96)}
.fc-l{display:flex;align-items:center;gap:8px;flex:1}
.fc-c{background:var(--ac);min-width:22px;height:22px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;padding:0 6px}
.fc-t{font-weight:600;font-size:14px}
.fc-i{font-size:12px;opacity:.7;white-space:nowrap}

/* toast styles moved to enhanced section below */

@media(max-width:380px){.grid{gap:8px}.cinf{padding:9px}.cnm{font-size:12px}.hero h2{font-size:22px}}
.ci-w::-webkit-scrollbar{width:3px}
.ci-w::-webkit-scrollbar-thumb{background:rgba(44,24,16,.12);border-radius:2px}





/* ═══════════════════════════════════════════════════════════════════
   ✦ WORLD-CLASS MOTION SYSTEM — Premium Spring Physics ✦
   Designed with principles from Apple HIG, Stripe, Linear & Framer
   ═══════════════════════════════════════════════════════════════════ */

:root {
  /* Premium easing library */
  --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
  --ease-out-expo:  cubic-bezier(0.19, 1, 0.22, 1);
  --ease-in-out-quart: cubic-bezier(0.76, 0, 0.24, 1);
  --ease-overshoot: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-overshoot-strong: cubic-bezier(0.68, -0.3, 0.32, 1.55);
  --ease-anticipate: cubic-bezier(0.68, -0.55, 0.27, 1.55);
  --ease-spring-gentle: cubic-bezier(0.22, 1.3, 0.36, 1);
  --ease-spring-heavy: cubic-bezier(0.16, 1.11, 0.3, 1.02);
  --ease-liquid: cubic-bezier(0.4, 0, 0.1, 1.1);
  --ease-cinema: cubic-bezier(0.83, 0, 0.17, 1);
}

/* ───────────── QUANTITY CONTROLS ───────────── */
.qc {
  position: relative;
  background: var(--bg);
  border-radius: 12px;
  padding: 2px;
  transition: background .5s var(--ease-out-expo),
              box-shadow .5s var(--ease-out-quart);
}
.qc.has-qty {
  background: linear-gradient(135deg, rgba(200,149,108,.1), rgba(200,149,108,.04));
  box-shadow: 0 2px 14px rgba(200,149,108,.14), inset 0 1px 0 rgba(255,255,255,.4);
}
.qb.add {
  transition: border-radius .55s var(--ease-out-expo),
              background .35s ease,
              transform .25s var(--ease-overshoot),
              box-shadow .4s var(--ease-out-quart),
              width .5s var(--ease-out-expo);
}
.qc.has-qty .qb.add { border-radius: 0 10px 10px 0; }
.qb.min {
  border-radius: 10px 0 0 10px;
  transition: opacity .4s var(--ease-out-expo),
              width .5s var(--ease-out-expo),
              border .35s ease,
              transform .25s var(--ease-overshoot);
}
.qv { transition: width .5s var(--ease-out-expo), opacity .35s ease; }

/* ───────────── HEART / FAVORITE ───────────── */
.fav-btn svg {
  transition: transform .5s var(--ease-overshoot),
              color .4s ease,
              fill .4s ease,
              stroke-width .4s ease;
  fill: transparent;
  stroke: #ccc;
}
.fav-btn.on svg {
  fill: var(--heart);
  stroke: var(--heart);
  stroke-width: 0;
  filter: drop-shadow(0 2px 6px rgba(232,93,117,.45));
}
.fav-btn.pop svg { animation: heartBurst .7s var(--ease-overshoot); }
@keyframes heartBurst {
  0%   { transform: scale(1) rotate(0); stroke-width: 2; }
  12%  { transform: scale(.55) rotate(-3deg); stroke-width: 3; }
  32%  { transform: scale(1.4) rotate(-10deg); stroke-width: 0; }
  48%  { transform: scale(.88) rotate(6deg); }
  68%  { transform: scale(1.12) rotate(-3deg); }
  85%  { transform: scale(.96) rotate(1deg); }
  100% { transform: scale(1) rotate(0); }
}
/* Multi-layered heart burst: ring + glow */
.fav-btn::before,
.fav-btn::after {
  content: '';
  position: absolute;
  pointer-events: none;
  border-radius: 50%;
  opacity: 0;
}
.fav-btn::after {
  inset: -2px;
  border: 2px solid var(--heart);
  transform: scale(.7);
}
.fav-btn::before {
  inset: -8px;
  background: radial-gradient(circle, rgba(232,93,117,.35) 0%, transparent 60%);
  transform: scale(.4);
}
.fav-btn.pop::after { animation: ringBurst .7s var(--ease-out-expo); }
.fav-btn.pop::before { animation: glowBurst .7s var(--ease-out-quart); }
@keyframes ringBurst {
  0%   { opacity: .9; transform: scale(.7); border-width: 3px; }
  60%  { opacity: .4; transform: scale(1.5); border-width: 1px; }
  100% { opacity: 0;  transform: scale(2);   border-width: 0; }
}
@keyframes glowBurst {
  0%   { opacity: .8; transform: scale(.4); }
  70%  { opacity: .3; transform: scale(1.6); }
  100% { opacity: 0;  transform: scale(2); }
}

/* Sparkle confetti (JS-generated) */
.heart-sparkle {
  position: fixed; pointer-events: none; z-index: 9999;
  width: 6px; height: 6px; border-radius: 50%;
  will-change: transform, opacity;
  filter: drop-shadow(0 0 4px rgba(232,93,117,.7));
}

/* ───────────── TABS with sliding indicator ───────────── */
.tabs { position: relative; }
.tab {
  position: relative;
  transition: background .45s var(--ease-out-expo),
              color .45s var(--ease-out-expo),
              border-color .45s var(--ease-out-expo),
              transform .25s var(--ease-overshoot);
}
.tab.on {
  transform: scale(1.02);
  box-shadow: 0 4px 14px rgba(44,24,16,.18);
}
.tab:not(.on):hover { transform: translateY(-1px); }
.tab:active { transform: scale(.92); }

/* ───────────── BADGE premium morph ───────────── */
.badge {
  transition: transform .5s var(--ease-overshoot),
              opacity .35s ease,
              min-width .4s var(--ease-out-expo);
  border-radius: 10px;
  background: linear-gradient(135deg, var(--ac), var(--ac2));
  box-shadow: 0 3px 10px rgba(200,149,108,.5), inset 0 1px 0 rgba(255,255,255,.3);
}
@keyframes badgeMorph {
  0%   { transform: scale(0.2) rotate(-90deg); }
  45%  { transform: scale(1.4) rotate(8deg); }
  70%  { transform: scale(.88) rotate(-3deg); }
  100% { transform: scale(1) rotate(0); }
}
.badge.bmp { animation: badgeMorph .6s var(--ease-overshoot); }

/* ───────────── SEARCH focus morph ───────────── */
.search {
  transition: border-color .4s ease,
              box-shadow .55s var(--ease-out-expo),
              border-radius .55s var(--ease-out-expo),
              padding .45s var(--ease-out-expo),
              background .55s ease,
              transform .4s var(--ease-out-expo);
}
.search:focus {
  border-radius: 22px;
  padding-left: 46px;
  background: rgba(255,255,255,.85);
  transform: scale(1.015);
}
.search-ic {
  transition: color .35s ease, transform .5s var(--ease-overshoot), left .45s var(--ease-out-expo);
}
.search:focus ~ .search-ic { transform: translateY(-50%) scale(1.1); left: 34px; }

/* ───────────── HEADER scroll morph ───────────── */
.hd {
  transition: padding .55s var(--ease-out-expo),
              box-shadow .5s ease,
              background .55s ease,
              border-color .55s ease,
              backdrop-filter .4s ease;
}
.hd.sc {
  padding: 10px 20px;
  background: linear-gradient(135deg, rgba(255,255,255,.78), rgba(251,247,242,.82));
  backdrop-filter: blur(28px) saturate(1.8);
  -webkit-backdrop-filter: blur(28px) saturate(1.8);
  box-shadow: 0 1px 0 rgba(255,255,255,.5), 0 8px 24px rgba(44,24,16,.08);
}

/* ───────────── CARDS — 3D tilt + staggered entrance ───────────── */
.card {
  transition: transform .5s var(--ease-out-expo),
              box-shadow .45s ease,
              border-color .45s ease;
  transform-style: preserve-3d;
}
.card.vis { animation: cardEnter .7s var(--ease-spring-heavy) both; }
@keyframes cardEnter {
  0% { opacity: 0; transform: translateY(36px) scale(.92) rotateX(6deg); filter: blur(4px); }
  60% { filter: blur(0); }
  100% { opacity: 1; transform: translateY(0) scale(1) rotateX(0); filter: blur(0); }
}
.card:hover {
  box-shadow: 0 20px 48px rgba(44,24,16,.12),
              0 0 0 1px rgba(200,149,108,.2),
              inset 0 1px 0 rgba(255,255,255,.7);
  border-color: rgba(200,149,108,.3);
}
/* 3D mouse tilt (JS-driven) */
.card[data-tilt] {
  transition: transform .35s var(--ease-out-expo), box-shadow .45s ease, border-color .45s ease;
}
/* Dynamic glare sheen that follows cursor */
.card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: radial-gradient(
    circle at var(--mx, 50%) var(--my, 50%),
    rgba(255,255,255,.55) 0%,
    transparent 35%
  );
  opacity: 0;
  pointer-events: none;
  z-index: 2;
  transition: opacity .4s ease;
  mix-blend-mode: overlay;
}
.card:hover::before { opacity: 1; }

/* Card image with subtle depth zoom */
.cimg img {
  transition: transform .9s var(--ease-out-expo),
              filter .5s ease;
}
.card:hover .cimg img { transform: scale(1.08); filter: saturate(1.08) brightness(1.02); }

/* ───────────── HERO gold shimmer ───────────── */
.hero h2 em {
  background: linear-gradient(90deg, var(--ac) 10%, var(--gold) 45%, #F0DFC0 55%, var(--gold) 65%, var(--ac) 90%);
  background-size: 250% 100%;
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  animation: goldShimmer 7s ease-in-out infinite;
  filter: drop-shadow(0 2px 12px rgba(200,149,108,.2));
}
@keyframes goldShimmer {
  0%,100% { background-position: 0% 0; }
  50%     { background-position: 100% 0; }
}

/* ───────────── FLY-TO-CART particle system ───────────── */
.fly-dot {
  position: fixed; z-index: 9999; pointer-events: none;
  width: 28px; height: 28px; border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #F5D4A0, var(--ac) 70%, var(--ac2) 100%);
  box-shadow: 0 6px 20px rgba(200,149,108,.55),
              0 0 0 3px rgba(200,149,108,.2),
              inset 0 2px 3px rgba(255,255,255,.5);
  will-change: transform, opacity;
}
.fly-dot-x { display: inline-block; will-change: transform; }
.fly-dot-y { display: inline-block; will-change: transform, opacity; }

.fly-trail {
  position: fixed; width: 22px; height: 22px; border-radius: 50%;
  background: radial-gradient(circle, var(--gold), transparent 70%);
  pointer-events: none; z-index: 9998; opacity: .85;
  filter: blur(8px); will-change: transform, opacity;
}

/* ───────────── PRESET buttons ───────────── */
.preset {
  position: relative; overflow: hidden;
  transition: all .3s var(--ease-overshoot);
}
.preset.on { animation: presetBounce .55s var(--ease-overshoot); }
@keyframes presetBounce {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.22) rotate(-2deg); }
  70%  { transform: scale(.92) rotate(1deg); }
  100% { transform: scale(1) rotate(0); }
}
.preset .ripple {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(200,149,108,.5), transparent 70%);
  transform: scale(0);
  animation: rippleOut .6s var(--ease-out-expo) forwards;
  pointer-events: none;
}
@keyframes rippleOut {
  0% { transform: scale(0); opacity: .9; }
  100% { transform: scale(4); opacity: 0; }
}

/* Slot-machine quantity roll (CSS kept for fallback) */
.qv.roll-up   { animation: slotUp .35s var(--ease-out-expo); }
.qv.roll-down { animation: slotDown .35s var(--ease-out-expo); }
@keyframes slotUp {
  0% { opacity: 1; transform: translateY(0); }
  45% { opacity: 0; transform: translateY(-120%); }
  46% { opacity: 0; transform: translateY(120%); }
  100% { opacity: 1; transform: translateY(0); }
}
@keyframes slotDown {
  0% { opacity: 1; transform: translateY(0); }
  45% { opacity: 0; transform: translateY(120%); }
  46% { opacity: 0; transform: translateY(-120%); }
  100% { opacity: 1; transform: translateY(0); }
}

/* ───────────── TOAST — cinematic entrance ───────────── */
.toast {
  position: fixed; top: 72px; left: 50%;
  transform: translateX(-50%) translateY(-30px) scale(.88);
  background: linear-gradient(135deg, var(--text), #3D2418);
  color: #fff; padding: 0; border-radius: 16px;
  font-size: 12px; font-weight: 600;
  opacity: 0; z-index: 300; pointer-events: none;
  transition: all .55s var(--ease-overshoot);
  white-space: nowrap; max-width: 90vw; overflow: hidden;
  box-shadow: 0 12px 40px rgba(44,24,16,.3),
              0 2px 8px rgba(44,24,16,.2),
              inset 0 1px 0 rgba(255,255,255,.1);
  display: flex; flex-direction: column;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.toast.sh { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
.toast-body { display: flex; align-items: center; gap: 10px; padding: 11px 18px 9px; }
.toast-check { width: 18px; height: 18px; flex-shrink: 0; }
.toast-check circle { fill: none; stroke: rgba(255,255,255,.15); stroke-width: 2; }
.toast-check .ck {
  fill: none; stroke: #4ade80; stroke-width: 2.5;
  stroke-linecap: round; stroke-linejoin: round;
  stroke-dasharray: 20; stroke-dashoffset: 20;
  transition: stroke-dashoffset .5s var(--ease-out-expo) .18s;
}
.toast.sh .ck { stroke-dashoffset: 0; }
.toast-text { flex: 1; letter-spacing: .15px; }
.toast-progress { height: 3px; background: rgba(255,255,255,.08); overflow: hidden; }
.toast-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--ac), var(--gold), var(--ac));
  background-size: 200% 100%;
  border-radius: 3px; width: 100%; transform-origin: left;
  transition: none;
}
.toast.sh .toast-bar {
  animation: toastShrink 2s linear forwards, toastShift 2s linear forwards;
}
@keyframes toastShrink { to { transform: scaleX(0); } }
@keyframes toastShift { to { background-position: 100% 0; } }

/* ───────────── LIQUID GLASS breathing ───────────── */
@keyframes glassBreathe {
  0%,100% { background: linear-gradient(135deg, rgba(255,255,255,.5), rgba(251,247,242,.6)); }
  50%     { background: linear-gradient(155deg, rgba(255,255,255,.58), rgba(251,247,242,.52), rgba(212,167,106,.06)); }
}
.hd { animation: glassBreathe 11s ease-in-out infinite, slideDownHeader 1.1s var(--ease-spring-heavy) both; }
.hd.sc { animation: glassBreatheS 11s ease-in-out infinite; }
@keyframes glassBreatheS {
  0%,100% { background: linear-gradient(135deg, rgba(255,255,255,.78), rgba(251,247,242,.82)); }
  50%     { background: linear-gradient(150deg, rgba(255,255,255,.82), rgba(251,247,242,.76), rgba(212,167,106,.08)); }
}
@keyframes searchBreathe {
  0%,100% { background: var(--glass); border-color: var(--glass-border); }
  50%     { background: rgba(255,255,255,.6); border-color: rgba(255,255,255,.72); }
}
.search:not(:focus) { animation: searchBreathe 12s ease-in-out infinite; }
.search:focus { animation: none; }

/* ───────────── APP CONTENT scale-down on modal ───────────── */
#app-content {
  background: var(--bg);
  min-height: 100vh;
  position: relative;
  z-index: 1;
  transform-origin: 50% 0%;
  transition: transform .9s var(--ease-out-expo),
              border-radius .9s var(--ease-out-expo),
              filter .9s var(--ease-out-expo);
  will-change: transform, border-radius, filter;
  overflow: hidden;
}
#app-content.modal-open {
  transform: scale(0.93) translateY(18px);
  border-radius: 40px;
  filter: brightness(0.68) blur(2px);
}

/* ───────────── AMBIENT MESH background ───────────── */
.mesh-bg {
  position: fixed; inset: -20%; pointer-events: none; z-index: 0;
  filter: blur(100px); opacity: .75;
  transition: transform 1.4s var(--ease-out-expo);
  will-change: transform;
}
.mesh-layer {
  position: absolute; border-radius: 50%;
  animation-iteration-count: infinite; animation-direction: alternate;
  animation-timing-function: ease-in-out;
  will-change: transform; mix-blend-mode: multiply;
}
.mesh-1 {
  width: 65vw; height: 65vw; top: 5%; left: -15%;
  background: radial-gradient(circle, rgba(200,149,108,.32) 0%, transparent 70%);
  animation: meshFloat1 22s infinite alternate;
}
.mesh-2 {
  width: 75vw; height: 75vw; bottom: 5%; right: -15%;
  background: radial-gradient(circle, rgba(212,167,106,.28) 0%, transparent 70%);
  animation: meshFloat2 28s infinite alternate;
}
.mesh-3 {
  width: 55vw; height: 55vw; top: 35%; left: 25%;
  background: radial-gradient(circle, rgba(255,255,255,.9) 0%, transparent 70%);
  animation: meshFloat3 19s infinite alternate;
  mix-blend-mode: screen;
}
.noise-overlay {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  opacity: .035; mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
@keyframes meshFloat1 { 0% { transform: translate(0,0) scale(1) rotate(0); } 100% { transform: translate(15vw, 20vh) scale(1.4) rotate(45deg); } }
@keyframes meshFloat2 { 0% { transform: translate(0,0) scale(1) rotate(0); } 100% { transform: translate(-20vw, -15vh) scale(1.3) rotate(-30deg); } }
@keyframes meshFloat3 { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(25vw, -15vh) scale(1.5); } }

/* ───────────── INTRO cascade ───────────── */
@keyframes slideDownHeader {
  from { transform: translateY(-110%) scale(.94); opacity: 0; }
  to   { transform: translateY(0) scale(1); opacity: 1; }
}
.magnetic-wrap { display: inline-block; padding: 8px; margin: -8px; }
.magnetic-inner { transition: transform .55s var(--ease-spring-heavy); will-change: transform; }

.br-ic {
  position: relative; overflow: hidden;
  transition: transform .55s var(--ease-overshoot), box-shadow .4s ease;
}
.br-ic:hover { transform: scale(1.1) rotate(8deg); box-shadow: 0 8px 24px rgba(200,149,108,.5); }
.br-ic::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(105deg, transparent 20%, rgba(255,255,255,.75) 50%, transparent 80%);
  transform: translateX(-100%);
  animation: shimmerSweep 4s infinite 1.2s var(--ease-out-expo);
}
@keyframes shimmerSweep {
  0%     { transform: translateX(-100%) skewX(-15deg); }
  55%,100% { transform: translateX(180%) skewX(-15deg); }
}

.hero { animation: fadeUpHero .95s var(--ease-spring-heavy) both .18s; }
@keyframes fadeUpHero {
  from { opacity: 0; transform: translateY(30px) scale(.94); filter: blur(6px); }
  to   { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}
.search-w { animation: fadeUpHero 1s var(--ease-spring-heavy) both .3s; }
.tabs     { animation: fadeUpHero .85s var(--ease-spring-heavy) both .42s; }

/* ───────────── DRAWER ───────────── */
.cd {
  transition: transform .6s var(--ease-spring-heavy);
  border-radius: 36px 36px 0 0;
  box-shadow: 0 -24px 72px rgba(0,0,0,.22),
              0 -2px 8px rgba(0,0,0,.08),
              inset 0 2px 4px rgba(255,255,255,.75);
  border: 1px solid rgba(255,255,255,.4);
  border-bottom: none;
  will-change: transform;
}
.cd-h {
  width: 44px; height: 5px; border-radius: 3px;
  background: rgba(44,24,16,.18);
  margin: 14px auto 0; cursor: grab;
  transition: width .45s var(--ease-overshoot), background .3s ease;
}
.cd-h:hover { background: rgba(44,24,16,.28); width: 50px; }
.cd-h:active { cursor: grabbing; width: 56px; background: rgba(44,24,16,.35); }

/* ───────────── TELEGRAM button ───────────── */
.tb {
  position: relative; overflow: hidden;
  transition: transform .45s var(--ease-overshoot),
              box-shadow .35s ease,
              background .4s ease;
}
.tb::after {
  content: ''; position: absolute; inset: -50%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.4), transparent);
  transform: translateX(-150%) skewX(-20deg);
}
.tb:not(.dis)::after { animation: shimmerBtn 3.8s infinite var(--ease-out-expo); }
@keyframes shimmerBtn {
  0%       { transform: translateX(-150%) skewX(-20deg); }
  55%,100% { transform: translateX(200%) skewX(-20deg); }
}
.tb:hover:not(.dis) {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 14px 40px rgba(42,171,238,.5), 0 4px 12px rgba(42,171,238,.3);
}
.tb:active:not(.dis) { transform: scale(.96) translateY(1px); }

/* ───────────── FAB / Dynamic Island ───────────── */
.fc {
  background: rgba(20, 15, 12, .94);
  backdrop-filter: blur(24px) saturate(170%);
  -webkit-backdrop-filter: blur(24px) saturate(170%);
  box-shadow: inset 0 2px 4px rgba(255,255,255,.18),
              0 30px 64px rgba(0,0,0,.5),
              0 8px 20px rgba(0,0,0,.3);
  border-radius: 50px;
  padding: 14px 22px;
  border: 1px solid rgba(255,255,255,.1);
  transition: transform .55s var(--ease-spring-heavy),
              opacity .5s var(--ease-out-expo),
              box-shadow .4s ease;
  will-change: transform;
}
.fc.v { animation: fabBreathe 5.5s infinite alternate ease-in-out 1.8s; }
.fc:hover {
  animation: none;
  transform: translateX(-50%) translateY(-4px) scale(1.04) !important;
  box-shadow: inset 0 2px 4px rgba(255,255,255,.18),
              0 36px 80px rgba(0,0,0,.55),
              0 12px 28px rgba(0,0,0,.35);
}
.fc:active { animation: none !important; transform: translateX(-50%) scale(.96) !important; }
.fc.stretch { animation: fabStretch .7s var(--ease-liquid) !important; }
.fc.morph-to-drawer {
  border-radius: 28px 28px 0 0 !important;
  transform: translateX(-50%) scaleX(1.4) !important;
  opacity: 0;
  transition: all .4s var(--ease-out-expo);
}
@keyframes fabBreathe { to { transform: translateX(-50%) translateY(3px) scale(1.01); } }
@keyframes fabStretch {
  0%,100% { transform: translateX(-50%) scale(1); }
  40%     { transform: translateX(-50%) scaleX(1.08) scaleY(.9); }
  70%     { transform: translateX(-50%) scaleX(.97) scaleY(1.04); }
}

.fc-c {
  position: relative;
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--ac));
  box-shadow: 0 6px 20px rgba(200,149,108,.65),
              inset 0 2px 4px rgba(255,255,255,.55),
              inset 0 -2px 4px rgba(0,0,0,.1);
  font-size: 14px; font-weight: 800;
}
.fc-c.pop { animation: dotPop .85s var(--ease-liquid); }
@keyframes dotPop {
  0%   { transform: scale(1); }
  35%  { transform: scale(1.55) scaleX(1.15) scaleY(.82); }
  65%  { transform: scale(.88) scaleX(.95) scaleY(1.08); }
  100% { transform: scale(1); }
}
.fc-c.pop::after {
  content: ''; position: absolute; inset: 0; border-radius: 50%;
  border: 2px solid white;
  animation: ringOut .85s var(--ease-out-expo);
}
@keyframes ringOut {
  0%   { transform: scale(1); opacity: 1; border-width: 5px; }
  100% { transform: scale(2.8); opacity: 0; border-width: 0; }
}
.fc-t { font-weight: 700; font-size: 16px; letter-spacing: .3px; }
.fc-i { font-size: 14px; font-weight: 600; }

/* ───────────── CART BUTTONS (header) ───────────── */
.cb {
  transition: transform .3s var(--ease-overshoot),
              border-color .25s ease,
              box-shadow .3s ease,
              background .3s ease;
}
.cb:hover {
  transform: scale(1.1) rotate(-3deg);
  box-shadow: var(--glass-sh-hover), 0 6px 18px rgba(200,149,108,.25);
  background: rgba(255,255,255,.85);
}
.cb:active { transform: scale(.85) !important; }

/* ───────────── LIQUID PILL — the crown jewel ───────────── */
.cft { position: relative; min-height: 48px; display: flex; align-items: center; }

.liquid-pill {
  position: absolute; right: 0; width: 46px; height: 46px; border-radius: 23px;
  background: linear-gradient(135deg, var(--gold), var(--ac));
  box-shadow: inset 0 2px 4px rgba(255,255,255,.7),
              inset 0 -2px 3px rgba(0,0,0,.08),
              0 12px 28px rgba(200,149,108,.45),
              0 4px 10px rgba(200,149,108,.25);
  transition: width .85s var(--ease-liquid),
              background .65s var(--ease-out-expo),
              border-radius .85s var(--ease-liquid),
              transform .45s var(--ease-overshoot),
              box-shadow .65s var(--ease-out-expo);
  overflow: hidden; z-index: 3;
  will-change: width, transform;
  display: flex; align-items: center;
}
.card:hover .liquid-pill:not(.active) {
  transform: scale(1.08) translateY(-1px);
  box-shadow: inset 0 2px 4px rgba(255,255,255,.8),
              inset 0 -2px 3px rgba(0,0,0,.08),
              0 18px 36px rgba(200,149,108,.55),
              0 6px 14px rgba(200,149,108,.3);
}
.liquid-pill.active {
  width: 100%;
  background: rgba(255,255,255,.98);
  border: 1px solid rgba(255,255,255,1);
  box-shadow: 0 12px 32px rgba(0,0,0,.08),
              0 2px 6px rgba(0,0,0,.04),
              inset 0 2px 6px rgba(255,255,255,1);
  border-radius: 23px;
}
.liquid-pill.squish { animation: morphSquish .85s var(--ease-liquid); }
@keyframes morphSquish {
  0%   { transform: scale(1); }
  25%  { transform: scaleX(1.15) scaleY(.8); }
  55%  { transform: scaleX(.92) scaleY(1.08); }
  80%  { transform: scaleX(1.02) scaleY(.98); }
  100% { transform: scale(1); }
}

.pill-add-btn {
  position: absolute; inset: 0; width: 100%; height: 100%;
  color: white; font-size: 26px; font-weight: 400; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: .85s var(--ease-liquid); z-index: 2;
  cursor: pointer; border: none; background: transparent;
  font-family: 'Nunito', sans-serif;
  text-shadow: 0 2px 4px rgba(0,0,0,.15);
}
.liquid-pill.active .pill-add-btn {
  opacity: 0; transform: scale(.2) rotate(180deg); pointer-events: none;
}

.pill-inner {
  position: absolute; inset: 0; width: 100%;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 5px;
  opacity: 0; pointer-events: none;
  transform: scale(.7) rotate(-12deg);
  transition: .85s var(--ease-liquid);
}
.liquid-pill.active .pill-inner {
  opacity: 1; pointer-events: auto; transform: scale(1) rotate(0);
}
.pill-btn {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 700; color: var(--text);
  background: transparent; border: none; cursor: pointer;
  transition: transform .35s var(--ease-overshoot),
              background .3s ease;
  flex-shrink: 0; font-family: 'Nunito', sans-serif;
  -webkit-tap-highlight-color: transparent;
}
.pill-btn:hover { background: rgba(0,0,0,.05); transform: scale(1.08); }
.pill-btn:active { background: rgba(0,0,0,.12); transform: scale(.7); }

/* ───────────── CINEMATIC ODOMETER ───────────── */
.roll-wrap {
  display: inline-grid; vertical-align: bottom;
  perspective: 700px; transform-style: preserve-3d;
  transition: transform .45s var(--ease-overshoot),
              color .35s ease;
  font-weight: 800; font-size: 16px; color: var(--text);
  min-width: 26px; text-align: center;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  position: relative;
}
.roll-wrap:active { transform: scale(1.18); }
.roll-edit-input {
  width: 42px; height: 30px; border: 2px solid var(--ac);
  border-radius: 10px; background: rgba(255,255,255,.98);
  text-align: center; font-weight: 800; font-size: 15px;
  font-family: 'Nunito', sans-serif; color: var(--text);
  outline: none; padding: 0; margin: -4px -6px;
  box-shadow: 0 6px 20px rgba(200,149,108,.3), 0 0 0 3px rgba(200,149,108,.15);
  animation: editPop .4s var(--ease-overshoot);
  -moz-appearance: textfield;
}
.roll-edit-input::-webkit-inner-spin-button,
.roll-edit-input::-webkit-outer-spin-button { -webkit-appearance: none; }
@keyframes editPop {
  0%   { transform: scale(.5) rotate(-4deg); opacity: 0; }
  60%  { transform: scale(1.08) rotate(1deg); opacity: 1; }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}
.roll-wrap.bump { transform: scale(1.35); color: var(--ac); }
.roll-wrap > span {
  grid-area: 1/1;
  transition: transform .55s var(--ease-overshoot), opacity .4s ease;
  transform-style: preserve-3d;
}
.roll-wrap > span.en-up { transform: translateY(90%) rotateX(-65deg); opacity: 0; }
.roll-wrap > span.en-dn { transform: translateY(-90%) rotateX(65deg); opacity: 0; }
.roll-wrap > span.ex-up { transform: translateY(-90%) rotateX(65deg); opacity: 0; pointer-events: none; }
.roll-wrap > span.ex-dn { transform: translateY(90%) rotateX(-65deg); opacity: 0; pointer-events: none; }
.roll-wrap > span.active { transform: translateY(0) rotateX(0); opacity: 1; }

/* ───────────── CART ITEM entrance ───────────── */
.cit {
  animation: cartItemIn .5s var(--ease-spring-heavy) both;
  transition: opacity .3s ease, transform .4s var(--ease-out-expo);
}
@keyframes cartItemIn {
  0%   { opacity: 0; transform: translateX(24px) scale(.95); filter: blur(3px); }
  100% { opacity: 1; transform: translateX(0) scale(1); filter: blur(0); }
}
.cit.removing {
  opacity: 0;
  transform: translateX(-40px) scale(.92);
  pointer-events: none;
}

/* ───────────── LIGHTBOX ───────────── */
.lb {
  transition: opacity .5s var(--ease-out-expo),
              backdrop-filter .5s ease;
}
.lb.op { backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
.lb img {
  transition: transform .6s var(--ease-spring-heavy),

  transform: scale(.75) rotate(-2deg);
  opacity: .3;
}
.lb.op img { transform: scale(1) rotate(0); opacity: 1; }
.lb-x {
  transition: transform .3s var(--ease-overshoot),
              background .3s ease;
}
.lb-x:hover { transform: scale(1.15) rotate(90deg); background: rgba(255,255,255,.3); }
.lb-ask {
  transition: transform .35s var(--ease-overshoot),
              box-shadow .3s ease;
}
.lb-ask:hover { transform: scale(1.06) translateY(-2px); box-shadow: 0 10px 28px rgba(42,171,238,.55); }

/* ───────────── CART TAB buttons ───────────── */
.cd-tab {
  transition: background .4s var(--ease-out-expo),
              color .4s ease,
              border-color .4s ease,
              transform .25s var(--ease-overshoot);
}
.cd-tab:not(.on):hover { transform: translateY(-1px); }
.cd-tab.on { transform: scale(1.03); box-shadow: 0 4px 12px rgba(44,24,16,.2); }
.cd-tab:active { transform: scale(.95); }

/* ───────────── HISTORY ───────────── */
.hist-item { animation: cartItemIn .45s var(--ease-spring-heavy) both; }
.hist-reorder { transition: all .35s var(--ease-overshoot); }
.hist-reorder:active { transform: scale(.96); }

/* ───────────── ORGANIC flying particles ───────────── */
.fly-emj {
  position: fixed; font-size: 42px; pointer-events: none; z-index: 9999;
  filter: drop-shadow(0 20px 30px rgba(0,0,0,.35));
  will-change: transform;
}

/* ───────────── CURSOR SPOTLIGHT (desktop only) ───────────── */
@media (hover: hover) and (pointer: fine) {
  #app-content::after {
    content: '';
    position: fixed;
    top: var(--sy, 50%); left: var(--sx, 50%);
    width: 480px; height: 480px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212,167,106,.13) 0%, rgba(212,167,106,.05) 35%, transparent 65%);
    pointer-events: none; z-index: 2;
    mix-blend-mode: overlay;
    opacity: 0;
    transition: opacity .6s ease;
    will-change: transform;
  }
  #app-content.cursor-active::after { opacity: 1; }
}

/* ───────────── CATEGORY CROSSFADE ───────────── */
#cat.crossfade {
  animation: crossfade .5s var(--ease-out-expo);
}
@keyframes crossfade {
  0%   { opacity: 0; transform: translateY(10px); filter: blur(6px); }
  100% { opacity: 1; transform: translateY(0); filter: blur(0); }
}

/* ───────────── STIT (section title) entrance ───────────── */
.stit { animation: titleIn .7s var(--ease-spring-heavy) both; }
@keyframes titleIn {
  0%   { opacity: 0; transform: translateX(-20px); letter-spacing: 0; }
  100% { opacity: 1; transform: translateX(0); letter-spacing: normal; }

/* ───────────── RESPONSIVE ───────────── */
@media (max-width: 380px) {
  .liquid-pill { width: 40px; height: 40px; border-radius: 20px; }

/* ───────────── REDUCED MOTION ───────────── */
@media (prefers-reduced-motion: reduce) {
  *,*::before,*::after {
    animation-duration: .01ms !important;
    animation-iteration-count: 1 !important;

</style>

function toggleFav(id,ev){
  if(ev)ev.stopPropagation();
  const wasAdding = FAVS.indexOf(id)===-1;
  const idx=FAVS.indexOf(id);
  if(idx===-1){FAVS.push(id);sT("❤️ Добавлено в избранное")}
  else{FAVS.splice(idx,1);sT("Убрано из избранного")}
  saveState("favs",FAVS);
  updateFavUI();
  // Animate the button
  const btn=document.getElementById("fv"+id);
  if(btn){
    btn.classList.toggle("on",FAVS.includes(id));
    btn.classList.remove("pop");void btn.offsetWidth;btn.classList.add("pop");
    // Sparkle confetti when ADDING to favorites
    if(wasAdding && !(window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches)){
      spawnHeartSparkles(btn);
    }
  }
  triggerHaptic(wasAdding?'heavy':'light');
  if(showFavsOnly)rCat();
}

// === Heart sparkle confetti system ===
function spawnHeartSparkles(btn){
  const rect = btn.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const colors = ['#E85D75','#FF8FA3','#FFB3C1','#D4A76A','#F0DFC0'];
  const count = 10;
  for(let i=0;i<count;i++){
    const s = document.createElement('div');
    s.className = 'heart-sparkle';
    s.style.background = colors[i % colors.length];
    s.style.left = (cx-3) + 'px';
    s.style.top = (cy-3) + 'px';
    const angle = (Math.PI*2 / count) * i + (Math.random()-.5)*0.5;
    const dist = 30 + Math.random()*40;
    const dx = Math.cos(angle)*dist;
    const dy = Math.sin(angle)*dist - 10; // slight upward bias
    const size = 4 + Math.random()*4;
    s.style.width = size+'px'; s.style.height = size+'px';
    document.body.appendChild(s);
    s.animate([
      { transform:'translate(0,0) scale(1)', opacity:1 },
      { transform:`translate(${dx*.6}px,${dy*.6 - 15}px) scale(1.2)`, opacity:1, offset:.3 },
      { transform:`translate(${dx}px,${dy+30}px) scale(0)`, opacity:0 }
    ], { duration: 650 + Math.random()*250, easing:'cubic-bezier(0.16, 1, 0.3, 1)' })
     .onfinish = () => s.remove();
  }
}

// === STAGGERED CARD ENTRANCE (Intersection Observer with wave pattern) ===
const observer=new IntersectionObserver((entries)=>{
  // Sort by visual position for wave-like cascade (left→right, top→bottom)
  entries.filter(e=>e.isIntersecting)
    .sort((a,b)=>{
      const ra=a.target.getBoundingClientRect(), rb=b.target.getBoundingClientRect();
      return (ra.top-rb.top)||(ra.left-rb.left);
    })
    .forEach((entry,i)=>{
      const delay = Math.min(i*55, 400); // cap cascade so later items don't lag too long
      setTimeout(()=>entry.target.classList.add("vis"), delay);
      observer.unobserve(entry.target);
    });
},{threshold:0.02,rootMargin:"60px"});

// Convert base64 data URL to a File object
async function b64toFile(dataUrl,name){
  const r=await fetch(dataUrl);
  const b=await r.blob();
  return new File([b],name+".jpg",{type:"image/jpeg"});
}

// Ask about unnamed product via Telegram
async function askAbout(id,ev){
  if(ev)ev.stopPropagation();
  const p=PRODUCTS.find(x=>x.id===id);
  if(navigator.canShare){
    try{
      const resp=await fetch(p.img);
      const blob=await resp.blob();
      const file=new File([blob],"product_"+id+".webp",{type:"image/webp"});
      const shareData={text:"👋 Здравствуйте! Подскажите, что это за товар?",files:[file]};
      if(navigator.canShare(shareData)){await navigator.share(shareData);return}
    }catch(e){if(e.name==="AbortError")return}
  }
  const enc2=encodeURIComponent("👋 Здравствуйте! Подскажите, что это за товар? (отправляю фото следующим сообщением)");
  const d2="tg://resolve?domain="+TG+"&text="+enc2;
  const w2="https://t.me/"+TG+"?text="+enc2;
  const a=document.createElement("a");a.href=d2;a.click();
  setTimeout(()=>{window.location.href=w2;},1500);
}

function roll(id, val) {
  const wrp = document.getElementById('roll-' + id);
  if (!wrp) return;
  const targetStr = String(val);
  const active = wrp.querySelector('span.active') || wrp.querySelector('span:not(.ex-up):not(.ex-dn)');
  if (active && active.textContent === targetStr) return;
  
  const sp = document.createElement('span'); sp.textContent = targetStr;
  const oNum = parseFloat((active ? active.textContent : "0").replace(/[^\d.-]/g, '')) || 0;
  const nNum = parseFloat(String(val).replace(/[^\d.-]/g, '')) || 0;
  const isUp = nNum > oNum;
  
  sp.className = isUp ? "en-up" : "en-dn"; wrp.appendChild(sp);
  wrp.classList.remove('bump'); void wrp.offsetWidth; wrp.classList.add('bump');
  void sp.offsetWidth;
  
  if (active) {
    active.className = isUp ? "ex-up" : "ex-dn";
    setTimeout(() => active.remove(), 650);
  }
  sp.className = "active";
}

// === PILL QUANTITY DIRECT EDIT ===
function editPillQty(e, id) {
  e.stopPropagation();
  const wrap = document.getElementById('roll-qty-' + id);
  if (!wrap || wrap.querySelector('.roll-edit-input')) return;
  const currentVal = C[id] || 0;
  
  // Hide existing spans
  wrap.querySelectorAll('span').forEach(s => s.style.display = 'none');
  
  const input = document.createElement('input');
  input.type = 'number';
  input.className = 'roll-edit-input';
  input.value = currentVal;
  input.min = 0;
  input.max = 9999;
  wrap.appendChild(input);
  
  // Select all text after animation frame
  requestAnimationFrame(() => {
    input.focus();
    input.select();
  });
  
  triggerHaptic('light');
  
  function commit() {
    const v = Math.max(0, parseInt(input.value) || 0);
    input.remove();
    wrap.querySelectorAll('span').forEach(s => s.style.display = '');
    
    if (v !== currentVal) {
      // Update pill state
      const pill = document.getElementById('pill-' + id);
      if (v === 0 && pill) {
        pill.classList.remove('active');
        pill.classList.remove('squish'); void pill.offsetWidth; pill.classList.add('squish');
        triggerHaptic('heavy');
      } else if (currentVal === 0 && v > 0 && pill) {
        pill.classList.add('active');
        pill.classList.remove('squish'); void pill.offsetWidth; pill.classList.add('squish');
        triggerHaptic('heavy');
      }
      roll('qty-' + id, v);
      sd(id, v);
      rCat();
    }
  }
  
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', ev => {
    if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
    if (ev.key === 'Escape') { input.value = currentVal; input.blur(); }
  });
}

function triggerHaptic(s) { try { if(navigator.vibrate) navigator.vibrate(s === 'heavy' ? [30, 15, 30] : 15); } catch(e) {} }

// === FLY-TO-CART ANIMATION (Arc Physics + Gold Ripples) ===
function flyToCart(btnEl){
  if(window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const rect=btnEl.getBoundingClientRect();
  
  // Target: cart drawer if open, FAB if visible, else badge
  const drawer=document.getElementById("cd");
  const drawerOpen=drawer&&drawer.classList.contains("op");
  const fab=document.getElementById("fc");
  const fabVisible=!drawerOpen&&fab&&fab.classList.contains("v");
  const target=drawerOpen?drawer:fabVisible?document.getElementById("fcc"):document.getElementById("bdg");
  const tRect=target.getBoundingClientRect();
  // When targeting drawer, aim at the top-center area
  const tX=drawerOpen?(tRect.left+tRect.width/2):(tRect.left+tRect.width/2);
  const tY=drawerOpen?(tRect.top+60):(tRect.top+tRect.height/2);
  const dx=tX - (rect.left+rect.width/2);
  const dy=tY - (rect.top+rect.height/2);
  const dur=700;

  const outer=document.createElement("div");
  outer.className="fly-dot-x";
  const startX=rect.left+rect.width/2-14;
  const startY=rect.top+rect.height/2-14;
  outer.style.cssText="position:fixed;top:"+startY+"px;left:"+startX+"px;z-index:9999;pointer-events:none";
  const inner=document.createElement("div");
  inner.className="fly-dot-y";
  const dot=document.createElement("div");
  dot.className="fly-dot";
  inner.appendChild(dot);
  outer.appendChild(inner);
  document.body.appendChild(outer);

  // Arc physics with independent X/Y easing
  outer.animate([
    {transform:"translateX(0)"},
    {transform:"translateX("+dx+"px)"}
  ],{duration:dur,easing:"linear",fill:"forwards"});

  inner.animate([
    {transform:"translateY(0) scale(1)",opacity:1},
    {transform:"translateY("+(dy*.3-100)+"px) scale(1.4)",opacity:1,offset:.4,easing:"cubic-bezier(0.2, 0.8, 0.2, 1)"},
    {transform:"translateY("+dy+"px) scale(.12)",opacity:0,easing:"cubic-bezier(0.5, 0, 0.8, 0.2)"}
  ],{duration:dur,fill:"forwards"}).onfinish = () => {
    outer.remove();
    
    // Impact: scale bounce on target
    if(drawerOpen) {
      // Subtle drawer shake + highlight
      drawer.style.transition='transform 0.15s ease-out';
      drawer.style.transform='translateY(-6px)';
      setTimeout(()=>{drawer.style.transition='transform 0.4s cubic-bezier(0.32,0.72,0,1)';drawer.style.transform=''},150);
    } else {
      target.style.transform="scale(1.3) rotate(-5deg)";
      setTimeout(()=>target.style.transform="",300);
    }
    
    // FAB dot pop animation
    if(fabVisible) {
      const fcc=document.getElementById("fcc");
      fcc.classList.remove('pop'); void fcc.offsetWidth; fcc.classList.add('pop');
      setTimeout(()=>fcc.classList.remove('pop'),900);
      // FAB stretch
      fab.classList.remove("stretch");void fab.offsetWidth;fab.classList.add("stretch");
      setTimeout(()=>fab.classList.remove("stretch"),700);
    } else {
      // Badge pulse
      const badge=document.getElementById("bdg");
      badge.parentElement.style.transform="scale(1.2)";
      setTimeout(()=>badge.parentElement.style.transform="",300);
    }
    
    // Gold ripple particles burst
    const ex=tX;
    const ey=tY;
    for(let i=0;i<4;i++){
      const p=document.createElement('div');p.className='fly-trail';
      p.style.left=(ex-10)+'px';p.style.top=(ey-10)+'px';document.body.appendChild(p);
      const ang=(Math.PI*2/4)*i;const dist=25+Math.random()*20;
      p.animate([
        {transform:'translate(0,0) scale(1)',opacity:0.7},
        {transform:`translate(${Math.cos(ang)*dist}px,${Math.sin(ang)*dist}px) scale(0)`,opacity:0}
      ],{duration:500,easing:"cubic-bezier(0.32,0.72,0,1)"}).onfinish=()=>p.remove();
    }
  };

  setTimeout(()=>{if(outer.parentNode)outer.remove()},dur+100);
}

function cq(id,d){const n=Math.max(0,(C[id]||0)+d);
  const first = d>0 && !C[id];
  
  // Fly animation on add
  if(d>0){
    const card=document.querySelector('.card[data-id="'+id+'"]');
    if(card){const addBtn=card.querySelector('.liquid-pill');if(addBtn)flyToCart(addBtn)}
  }
  
  // Liquid pill activation/deactivation
  const pill = document.getElementById('pill-'+id);
  if(pill) {
    if(first) {
      pill.classList.add('active');
      pill.classList.remove('squish'); void pill.offsetWidth; pill.classList.add('squish');
      triggerHaptic('heavy');
    } else if(n === 0) {
      pill.classList.remove('active');
      pill.classList.remove('squish'); void pill.offsetWidth; pill.classList.add('squish');
      triggerHaptic('heavy');
    } else {
      triggerHaptic('light');
    }
  }
  
  // Roll the odometer
  roll('qty-'+id, n);
  
  sd(id,n);
  if(d>0&&n===1){const p=PRODUCTS.find(x=>x.id===id);sT("✓ "+(p.ask?"Товар добавлен":p.name))}
}
function sq(id,v){sd(id,Math.max(0,parseInt(v)||0))}

function setPreset(id,val){
  const oldVal=C[id]||0;
  
  // Liquid pill activation
  const pill=document.getElementById('pill-'+id);
  if(pill && oldVal===0 && val>0){
    pill.classList.add('active');
    pill.classList.remove('squish'); void pill.offsetWidth; pill.classList.add('squish');
    triggerHaptic('heavy');
  } else if(pill && val===0) {
    pill.classList.remove('active');
    pill.classList.remove('squish'); void pill.offsetWidth; pill.classList.add('squish');
  }
  
  // Roll odometer
  roll('qty-'+id, val);
  
  sd(id,val);
  // Fly dot on first add
  if(oldVal===0&&val>0){
    const card=document.querySelector('.card[data-id="'+id+'"]');
    if(card){const addBtn=card.querySelector('.liquid-pill');if(addBtn)flyToCart(addBtn)}
  }
}
// Attach ripple via event delegation

  // Check if items changed (added/removed) vs just quantity update
  const prevIds=c._ids;
  const idsKey=ids.join(',');
  if(prevIds===idsKey){
    // Only quantity changed — update in-place without re-render
    ids.forEach(id=>{
      const q=C[id];
      const p=PRODUCTS.find(x=>x.id===+id);
      const row=c.querySelector('[data-cit="'+id+'"]');
      if(row){
        const inp=row.querySelector('.cqi');

        if(w)w.textContent=p.weight?(p.weight+" × "+q+" шт."):(q+" шт.");
      }
    });
    return;
  }
  
  // Full re-render needed (items added/removed)
  c._ids=idsKey;
  c.innerHTML=ids.map((id,i)=>{
    const p=PRODUCTS.find(x=>x.id===+id),q=C[id];
    const nm=p.ask?'Уточнить у @DarsmaSweets':p.name;

    '<div class="cit-q"><button class="cqb" onclick="cq('+p.id+',-1)">−</button>'+
    '<input type="number" class="cqi" value="'+q+'" min="0" max="9999" onfocus="this.select()" onchange="csq('+p.id+',this.value)" onkeydown="if(event.key===\'Enter\')this.blur()">'+
    '<button class="cqb" onclick="cq('+p.id+',1)">+</button></div></div>'
  }).join("");

function sT(m){
  const t=document.getElementById("toast");
  const txt=document.getElementById("toast-text");
  const bar=document.getElementById("toast-bar");
  // Reset animations
  t.classList.remove("sh");
  bar.style.animation="none";bar.offsetWidth;bar.style.animation="";
  // Force re-trigger checkmark
  const ck=t.querySelector(".ck");
  if(ck){ck.style.transition="none";ck.style.strokeDashoffset="20";ck.offsetWidth;ck.style.transition="";ck.style.strokeDashoffset=""}
  txt.textContent=m;
  requestAnimationFrame(()=>{t.classList.add("sh")});
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove("sh"),2200);
}

// === DRAWER DRAG-TO-CLOSE PHYSICS ===
const dragHandle = document.querySelector('.cd-h');
const drawerEl = document.getElementById('cd');
const overlayEl = document.getElementById('co');
const appContent = document.getElementById('app-content');
let dragStartY=0, dragCurrY=0, isDragging=false;

if(dragHandle && drawerEl) {
  dragHandle.addEventListener('touchstart', e => {
    dragStartY = e.touches[0].clientY;
    isDragging = true;
    drawerEl.style.transition = 'none';
    if(overlayEl) overlayEl.style.transition = 'none';
    if(appContent) appContent.style.transition = 'none';
  }, {passive:true});
  
  dragHandle.addEventListener('touchmove', e => {
    if(!isDragging) return;
    const d = e.touches[0].clientY - dragStartY;
    dragCurrY = d > 0 ? d : d * 0.12;
    drawerEl.style.transform = `translateY(${dragCurrY}px)`;
    
    if(d > 0 && overlayEl) {
      const p = Math.max(0, 1 - (dragCurrY/500));
      overlayEl.style.opacity = Math.max(0.05, p);
    }
  }, {passive:true});
  
  dragHandle.addEventListener('touchend', () => {
    if(!isDragging) return; isDragging = false;
    drawerEl.style.transition = 'transform 0.5s var(--spring-morph)';
    if(overlayEl) overlayEl.style.transition = 'opacity 0.5s var(--spring-morph)';
    
    if(dragCurrY > 120) {
      tCart();
    } else {
      drawerEl.style.transform = 'translateY(0)';
      if(overlayEl) overlayEl.style.opacity = 1;
    }
    dragCurrY = 0;
  });
}

// ✦ 3D CARD TILT — mouse-position driven parallax (desktop only)
// ═══════════════════════════════════════════════════════════════════
(function initCardTilt(){
  const isFine = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(!isFine || reducedMotion) return;
  
  let tiltRaf = null;
  const grid = document.getElementById('cat');
  if(!grid) return;
  
  grid.addEventListener('mousemove', e => {
    const card = e.target.closest('.card');
    if(!card) return;
    if(tiltRaf) cancelAnimationFrame(tiltRaf);
    tiltRaf = requestAnimationFrame(() => {
      const r = card.getBoundingClientRect();
      const px = (e.clientX - r.left) / r.width;   // 0..1
      const py = (e.clientY - r.top)  / r.height;  // 0..1
      const rx = (py - 0.5) * -6;  // tilt up/down in deg
      const ry = (px - 0.5) *  6;  // tilt left/right in deg
      card.style.transform = `perspective(900px) rotateX(${rx}deg) rotateY(${ry}deg) translateY(-3px) scale(1.01)`;
      // Glare position
      card.style.setProperty('--mx', (px*100).toFixed(1)+'%');
      card.style.setProperty('--my', (py*100).toFixed(1)+'%');
    });
  }, {passive:true});
  
  grid.addEventListener('mouseleave', e => {
    document.querySelectorAll('.card').forEach(c => {
      c.style.transform = '';
    });
  }, {passive:true, capture:true});
  
  // Reset on card leave (per-card)
  grid.addEventListener('mouseout', e => {
    const card = e.target.closest && e.target.closest('.card');
    if(!card) return;
    const to = e.relatedTarget;
    if(!to || !card.contains(to)) {
      card.style.transform = '';
    }
  }, {passive:true});
})();

// ═══════════════════════════════════════════════════════════════════
// ✦ CURSOR SPOTLIGHT — ambient light follows mouse (desktop only)
// ═══════════════════════════════════════════════════════════════════
(function initSpotlight(){
  const isFine = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(!isFine || reducedMotion) return;
  
  const app = document.getElementById('app-content');
  if(!app) return;
  
  let rafId = null, targetX = 0, targetY = 0, curX = 0, curY = 0;
  let hideTimer = null;
  
  function animate(){
    curX += (targetX - curX) * 0.12;
    curY += (targetY - curY) * 0.12;
    app.style.setProperty('--sx', curX + 'px');
    app.style.setProperty('--sy', curY + 'px');
    if(Math.abs(targetX-curX) > 0.5 || Math.abs(targetY-curY) > 0.5){
      rafId = requestAnimationFrame(animate);
    } else {
      rafId = null;
    }
  }
  
  window.addEventListener('mousemove', e => {
    targetX = e.clientX;
    targetY = e.clientY;
    app.classList.add('cursor-active');
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => app.classList.remove('cursor-active'), 2000);
    if(!rafId) rafId = requestAnimationFrame(animate);
  }, {passive:true});
})();

// ═══════════════════════════════════════════════════════════════════
// ✦ CART ITEM REMOVAL — slide-out animation before DOM removal
// ═══════════════════════════════════════════════════════════════════
// (handled in CSS via .cit.removing — JS hook below wraps cq)
(function wrapCqForRemovalAnim(){
  if(typeof cq !== 'function') return;
  const originalCq = cq;
  window.cq = function(id, d){
    const currentQty = C[id] || 0;
    const newQty = Math.max(0, currentQty + d);
    // If removing last one from cart AND cart drawer is open, animate the row out
    if(newQty === 0 && currentQty > 0){
      const drawer = document.getElementById('cd');
      if(drawer && drawer.classList.contains('op')){
        const row = document.querySelector('.cit[data-cit="'+id+'"]');
        if(row){
          row.classList.add('removing');
          setTimeout(() => originalCq(id, d), 280);
          return;
        }
      }
    }
    return originalCq(id, d);
  };
})();
